<!-- @dsCard group="Components" viewport="720x1060" name="Sheet Primitives" subtitle="Icon, StatBadge, InventoryGrid, ConditionMark, CurrencyPanel, FieldLine, SectionHeading, SheetPanel" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; background: var(--surface-page); }
  * { box-sizing: border-box; }
  .row-label {
    font-family: var(--font-serif);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 0 0 10px;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Icon, ICON_NAMES, StatBadge, CurrencyPanel, ConditionMark, InventoryGrid, FieldLine, SectionHeading, SheetPanel } = window.CairnDesignSystem_b44824;

function Block({ label, children, style }) {
  return (
    <div style={{ marginBottom: 26, ...style }}>
      <p className="row-label">{label}</p>
      {children}
    </div>
  );
}

function Specimen() {
  return (
    <div style={{ padding: 22, display: "flex", flexDirection: "column" }}>

      <Block label="Icon — the seven sheet illustrations">
        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", alignItems: "flex-start" }}>
          {ICON_NAMES.map((n) => (
            <div key={n} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, width: 74 }}>
              <Icon name={n} size={58} />
              <span style={{ fontFamily: "var(--font-serif)", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-muted)" }}>{n}</span>
            </div>
          ))}
        </div>
      </Block>

      <Block label="StatBadge — plain (Armor/Coin), split (STR…), crimson accent (HP only)">
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 140px)", gap: 22 }}>
          <StatBadge icon="armor" value={1} size={70} />
          <StatBadge icon="hp" split accent="crimson" value={4} max={6} size={64} />
          <StatBadge icon="str" split value={14} max={14} size={64} />
          <StatBadge icon="wil" split size={70} />
        </div>
      </Block>

      <Block label="InventoryGrid — Hands / Body / Backpack, fatigue tickboxes">
        <div style={{ maxWidth: 560 }}>
          <InventoryGrid
            items={[
              { text: "Sword (d8)" }, { text: "Torch" },
              { text: "Chainmail (2 Armor)" }, {},
              { text: "Rations (3 days)", fatigue: true }, { text: "Rope, 25ft" },
            ]}
          />
        </div>
      </Block>

      <Block label="ConditionMark &amp; CurrencyPanel">
        <div style={{ display: "flex", gap: 36, flexWrap: "wrap", alignItems: "center" }}>
          <ConditionMark />
          <ConditionMark checked />
          <ConditionMark showIcon size={44} />
          <CurrencyPanel gp={12} sp={4} cp={0} size={64} />
        </div>
      </Block>

      <Block label="FieldLine · SectionHeading · SheetPanel">
        <SheetPanel style={{ maxWidth: 560 }}>
          <SectionHeading>Notes</SectionHeading>
          <div style={{ display: "flex", gap: 24 }}>
            <div style={{ flex: 1 }}><FieldLine label="Name" value="Brannagh Vale" /></div>
            <div style={{ flex: 1 }}><FieldLine label="Background" /></div>
          </div>
        </SheetPanel>
      </Block>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Specimen />);
</script>
</body>
</html>
