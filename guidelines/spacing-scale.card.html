<!-- @dsCard group="Spacing" viewport="700x300" name="Spacing Scale" subtitle="4px base unit, --space-1 through --space-9" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page);}
  *{box-sizing:border-box;font-family:var(--font-serif);color:var(--text-primary);}
  body{padding:18px 22px;}
  .row{display:flex;align-items:center;gap:12px;padding:5px 0;}
  .tag{width:130px;flex:0 0 auto;font-size:12px;color:var(--text-muted);}
  .bar{height:14px;background:var(--ink-900);}
</style></head>
<body>
  <div class="row"><span class="tag">space-1 · 4px</span><div class="bar" style="width:var(--space-1)"></div></div>
  <div class="row"><span class="tag">space-2 · 8px</span><div class="bar" style="width:var(--space-2)"></div></div>
  <div class="row"><span class="tag">space-3 · 12px</span><div class="bar" style="width:var(--space-3)"></div></div>
  <div class="row"><span class="tag">space-4 · 16px</span><div class="bar" style="width:var(--space-4)"></div></div>
  <div class="row"><span class="tag">space-5 · 24px</span><div class="bar" style="width:var(--space-5)"></div></div>
  <div class="row"><span class="tag">space-6 · 32px</span><div class="bar" style="width:var(--space-6)"></div></div>
  <div class="row"><span class="tag">space-7 · 48px</span><div class="bar" style="width:var(--space-7)"></div></div>
  <div class="row"><span class="tag">space-8 · 64px</span><div class="bar" style="width:var(--space-8)"></div></div>
  <div class="row"><span class="tag">space-9 · 96px</span><div class="bar" style="width:var(--space-9)"></div></div>
</body></html>
