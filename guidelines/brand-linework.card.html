<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page);}
  *{box-sizing:border-box;font-family:var(--font-serif);color:var(--text-primary);}
  body{padding:20px 22px;display:flex;flex-direction:column;gap:16px;}
  .row{display:flex;align-items:center;gap:14px;}
  .tag{width:170px;flex:0 0 auto;font-size:12px;color:var(--text-muted);}
  .line{flex:1;background:var(--ink-900);}
</style></head>
<body>
  <div class="row"><span class="tag">hairline · 1px · box borders &amp; dividers</span><div class="line" style="height:var(--stroke-hairline)"></div></div>
  <div class="row"><span class="tag">rule · 2px · emphasis strokes</span><div class="line" style="height:var(--stroke-rule)"></div></div>
  <div class="row"><span class="tag">heavy · 3px · rare, frame emphasis</span><div class="line" style="height:var(--stroke-heavy)"></div></div>
</body></html>
