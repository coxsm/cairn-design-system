<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page);}
  *{box-sizing:border-box;font-family:var(--font-serif);color:var(--text-primary);}
  body{padding:18px 22px;}
  .row{display:flex;align-items:baseline;gap:14px;padding:7px 0;}
  .tag{width:90px;flex:0 0 auto;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);}
  .sample{font-size:26px;}
</style></head>
<body>
  <div class="row"><span class="tag">400 regular</span><span class="sample" style="font-weight:400">Willpower saves</span></div>
  <div class="row"><span class="tag">500 medium</span><span class="sample" style="font-weight:500">Willpower saves</span></div>
  <div class="row"><span class="tag">600 semibold</span><span class="sample" style="font-weight:600">Willpower saves</span></div>
  <div class="row"><span class="tag">700 bold</span><span class="sample" style="font-weight:700">Willpower saves</span></div>
  <div class="row"><span class="tag">900 black</span><span class="sample" style="font-weight:900">Willpower saves</span></div>
</body></html>
