<!-- @dsCard group="Spacing" viewport="700x210" name="Spacing Applied" subtitle="space-2 within a cluster, space-5 between panel sections" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page);}
  *{box-sizing:border-box;font-family:var(--font-serif);color:var(--text-primary);}
  body{padding:18px 22px;}
  .panel{border:var(--stroke-rule) solid var(--border-default);background:var(--surface-raised);padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-5);}
  .cluster{display:flex;gap:var(--space-2);align-items:center;}
  .chip{border:var(--stroke-hairline) solid var(--border-default);padding:4px 10px;font-size:13px;}
  .label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;}
</style></head>
<body>
  <div class="panel">
    <div>
      <div class="label">gap: space-2 (8px) — tight icon/label clusters</div>
      <div class="cluster"><span class="chip">STR</span><span class="chip">14</span></div>
    </div>
    <div>
      <div class="label">panel padding: space-5 (24px) — the ruled-box standard</div>
      <div class="cluster"><span class="chip">outer edge ↔ content</span></div>
    </div>
  </div>
</body></html>
