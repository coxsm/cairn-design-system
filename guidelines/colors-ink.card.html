<!-- @dsCard group="Colors" viewport="700x170" name="Ink Ramp" subtitle="Neutral near-black ramp — never pure #000" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page);}
  *{box-sizing:border-box;}
  .row{display:flex;height:170px;}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--font-serif);color:var(--paper-050);}
  .sw span{display:block;}
  .name{font-size:12px;letter-spacing:.08em;text-transform:uppercase;opacity:.85;}
  .hex{font-size:12px;opacity:.7;}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ink-900)"><span class="name">ink-900</span><span class="hex">#0c0c0c</span></div>
    <div class="sw" style="background:var(--ink-700)"><span class="name">ink-700</span><span class="hex">#2b2b2b</span></div>
    <div class="sw" style="background:var(--ink-500)"><span class="name">ink-500</span><span class="hex">#6f6f6f</span></div>
    <div class="sw" style="background:var(--ink-300)"><span class="name">ink-300</span><span class="hex">#a3a3a3</span></div>
    <div class="sw" style="background:var(--ink-150);color:var(--ink-900);"><span class="name">ink-150</span><span class="hex">#cfcfcf</span></div>
  </div>
</body></html>
