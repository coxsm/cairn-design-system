<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page);}
  *{box-sizing:border-box;font-family:var(--font-serif);color:var(--text-secondary);}
  body{padding:20px 22px;}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:26px;}
  h3{margin:0 0 4px;font-size:14px;font-weight:var(--weight-bold);letter-spacing:.03em;text-transform:uppercase;color:var(--text-primary);}
  p{margin:0 0 10px;font-size:var(--text-sm);line-height:var(--leading-body);}
</style></head>
<body>
  <div class="cols">
    <div>
      <h3>Saves</h3>
      <p>Roll a d20 equal to or under an ability. 1 is always a success, 20 is always a failure.</p>
    </div>
    <div>
      <h3>Healing</h3>
      <p>HP is lost during combat &amp; recovered instantly after combat ends. STR takes healing potions, spells, or time to recover.</p>
    </div>
  </div>
</body></html>
