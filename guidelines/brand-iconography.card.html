<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page);}
  *{box-sizing:border-box;font-family:var(--font-serif);}
  body{padding:20px 22px;}
  .grid{display:flex;gap:20px;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;width:78px;}
  img{width:64px;height:64px;}
  span{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);}
</style></head>
<body>
  <div class="grid">
    <div class="item"><img src="../assets/icons/str.svg" alt="STR"><span>str</span></div>
    <div class="item"><img src="../assets/icons/dex.svg" alt="DEX"><span>dex</span></div>
    <div class="item"><img src="../assets/icons/wil.svg" alt="WIL"><span>wil</span></div>
    <div class="item"><img src="../assets/icons/hp.svg" alt="HP"><span>hp</span></div>
    <div class="item"><img src="../assets/icons/armor.svg" alt="Armor"><span>armor</span></div>
    <div class="item"><img src="../assets/icons/coin.svg" alt="Coin"><span>coin</span></div>
    <div class="item"><img src="../assets/icons/deprived.svg" alt="Deprived"><span>deprived</span></div>
  </div>
</body></html>
