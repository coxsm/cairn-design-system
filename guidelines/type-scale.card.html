<!-- @dsCard group="Type" viewport="700x400" name="Type Scale" subtitle="xs (13px) through display (88px), all one family" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page);}
  *{box-sizing:border-box;font-family:var(--font-serif);color:var(--text-primary);}
  body{padding:18px 22px;}
  .row{display:flex;align-items:baseline;gap:14px;border-bottom:var(--stroke-hairline) solid var(--border-default);padding:6px 0;}
  .tag{width:110px;flex:0 0 auto;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);}
  .sample{flex:1;}
</style></head>
<body>
  <div class="row"><span class="tag">xs / 13</span><span class="sample" style="font-size:var(--text-xs)">Cairn character sheet</span></div>
  <div class="row"><span class="tag">sm / 15</span><span class="sample" style="font-size:var(--text-sm)">Cairn character sheet</span></div>
  <div class="row"><span class="tag">base / 17</span><span class="sample" style="font-size:var(--text-base)">Cairn character sheet</span></div>
  <div class="row"><span class="tag">md / 19</span><span class="sample" style="font-size:var(--text-md)">Cairn character sheet</span></div>
  <div class="row"><span class="tag">lg / 23</span><span class="sample" style="font-size:var(--text-lg);font-weight:var(--weight-bold)">Cairn character sheet</span></div>
  <div class="row"><span class="tag">xl / 29</span><span class="sample" style="font-size:var(--text-xl);font-weight:var(--weight-bold)">Cairn</span></div>
  <div class="row"><span class="tag">2xl / 40</span><span class="sample" style="font-size:var(--text-2xl);font-weight:var(--weight-bold)">Cairn</span></div>
  <div class="row" style="border-bottom:none;"><span class="tag">display / 88</span><span class="sample" style="font-size:56px;font-weight:var(--weight-black)">Cairn</span></div>
</body></html>
