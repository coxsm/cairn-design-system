<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cairn Random Character</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="print.css">
  <script crossorigin="anonymous" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="_ds_bundle.js"></script>
</head>
<body>
  <div id="app"></div>
  <div class="floating-controls" id="controls" hidden>
    <div>
      <label>Sheet mode</label>
      <div class="segmented" id="mode-buttons">
        <button type="button" data-mode="filled">Filled</button>
        <button type="button" data-mode="blank">Blank</button>
        <button type="button" data-mode="pencil">Max stats</button>
      </div>
    </div>
    <div>
      <label>Notes pages</label>
      <div class="segmented" id="notes-buttons">
        <button type="button" data-notes="0">0</button>
        <button type="button" data-notes="1">1</button>
      </div>
    </div>
    <div id="stat-inputs" class="stat-inputs">
      <label>Stats</label>
      <div class="stat-grid">
        <label>HP <input id="stat-hp" type="text" inputmode="numeric" data-stat="hp" autocomplete="off"></label>
        <label>STR <input id="stat-str" type="text" inputmode="numeric" data-stat="str" autocomplete="off"></label>
        <label>DEX <input id="stat-dex" type="text" inputmode="numeric" data-stat="dex" autocomplete="off"></label>
        <label>WIL <input id="stat-wil" type="text" inputmode="numeric" data-stat="wil" autocomplete="off"></label>
        <label>Armor <input id="stat-armor" type="text" inputmode="numeric" data-stat="armor" autocomplete="off"></label>
        <label>Coin <input id="stat-coin" type="text" inputmode="numeric" data-stat="coin" autocomplete="off"></label>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
